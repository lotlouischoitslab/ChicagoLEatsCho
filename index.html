<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago L Eats — Ride the Line, Find Your Meal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E; --blue: #00A1DE; --brown: #62361B; --green: #009B3A;
    --orange: #F9461C; --purple: #522398; --pink: #E27EA6; --yellow: #F9E300;
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
    --text: #f0ede8; --muted: #888; --accent: #F9E300;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ---- HERO ---- */
  .hero {
    position: relative; padding: 80px 40px 60px; text-align: center;
    border-bottom: 1px solid var(--border); overflow: hidden;
  }
  .hero-track {
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg,
      var(--red) 0 80px, transparent 80px 100px,
      var(--blue) 100px 180px, transparent 180px 200px,
      var(--brown) 200px 280px, transparent 280px 300px,
      var(--green) 300px 380px, transparent 380px 400px,
      var(--orange) 400px 480px, transparent 480px 500px,
      var(--purple) 500px 580px, transparent 580px 600px
    );
    animation: slide 20s linear infinite;
  }
  @keyframes slide { from { background-position: 0 0; } to { background-position: 600px 0; } }
  .hero h1 {
    font-family: 'Space Mono', monospace; font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700; letter-spacing: -0.02em; line-height: 1.1;
    color: var(--accent); text-shadow: 0 0 40px rgba(249,227,0,0.2);
  }
  .hero h1 span { color: var(--text); }
  .hero p { margin-top: 16px; font-size: 1.1rem; color: var(--muted); max-width: 500px; margin-left: auto; margin-right: auto; margin-top: 16px; }
  .hero-stats { display: flex; gap: 32px; justify-content: center; margin-top: 40px; }
  .stat { text-align: center; }
  .stat-n { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-l { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  /* ---- LINE DOTS (legend) ---- */
  .lines-legend {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
  }
  .line-badge {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 20px; font-family: 'Space Mono', monospace; font-size: 0.72rem;
    font-weight: 700; cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    border: 2px solid transparent; user-select: none;
  }
  .line-badge:hover { transform: scale(1.05); }
  .line-badge.active { border-color: rgba(255,255,255,0.6); }
  .line-badge.inactive { opacity: 0.3; }
  .line-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ---- CONTROLS ---- */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    padding: 20px 40px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .controls input[type=text] {
    flex: 1; min-width: 200px; padding: 10px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.82rem;
  }
  .controls input[type=text]::placeholder { color: var(--muted); }
  .controls input[type=text]:focus { outline: none; border-color: var(--accent); }
  .controls select {
    padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.82rem; cursor: pointer;
  }
  .controls select:focus { outline: none; border-color: var(--accent); }
  .sort-btn {
    padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 0.75rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .sort-btn:hover, .sort-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .count-badge {
    margin-left: auto; font-family: 'Space Mono', monospace; font-size: 0.75rem;
    color: var(--muted); white-space: nowrap;
  }

  /* ---- GRID ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
  .card {
    background: var(--bg); padding: 24px; display: flex; flex-direction: column;
    gap: 14px; cursor: pointer; transition: background 0.15s;
    position: relative; overflow: hidden;
  }
  .card:hover { background: var(--surface); }
  .card-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-name { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; line-height: 1.3; color: var(--text); }
  .card-rating { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .rating-num { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; }
  .rating-stars { font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .meta-tag {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace;
  }
  .meta-tag.cuisine { border-color: #444; color: #ccc; }
  .meta-tag.price { border-color: var(--accent); color: var(--accent); }
  .card-station { display: flex; align-items: flex-start; gap: 10px; }
  .station-icon { font-size: 11px; background: var(--surface2); padding: 4px 8px; border-radius: 6px; font-family: 'Space Mono', monospace; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
  .station-text { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
  .station-name { color: var(--text); font-weight: 500; }
  .card-lines { display: flex; gap: 5px; flex-wrap: wrap; }
  .line-pill { width: 20px; height: 8px; border-radius: 4px; }
  .card-comment { font-size: 0.82rem; color: var(--muted); line-height: 1.5; font-style: italic; border-left: 2px solid var(--border); padding-left: 10px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .card-hood { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-link { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .no-results { padding: 80px 40px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
  }
  .modal-hero { padding: 32px 32px 0; position: relative; }
  .modal-hero-bar { height: 4px; border-radius: 2px; margin-bottom: 24px; }
  .modal-title { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--muted);
    font-size: 1rem; cursor: pointer; padding: 4px 10px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 32px 32px; display: flex; flex-direction: column; gap: 20px; }
  .modal-row { display: flex; gap: 12px; }
  .modal-field { flex: 1; }
  .modal-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .modal-value { font-size: 0.9rem; color: var(--text); }
  .modal-comment-box {
    background: var(--surface2); border-radius: 10px; padding: 16px;
    font-size: 0.88rem; color: var(--text); line-height: 1.6; font-style: italic;
    border-left: 3px solid var(--accent);
  }
  .modal-lines { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .modal-line-pill {
    display: flex; align-items: center; gap: 6px; padding: 5px 14px;
    border-radius: 20px; font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700;
  }
  .modal-cta {
    display: block; text-align: center; background: var(--accent); color: #000;
    text-decoration: none; font-family: 'Space Mono', monospace; font-weight: 700;
    font-size: 0.85rem; padding: 14px; border-radius: 10px; margin-top: 4px;
  }
  .modal-cta:hover { opacity: 0.9; }

  /* ---- FOOTER ---- */
  footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; font-family: 'Space Mono', monospace; }
  footer strong { color: var(--accent); }

  @media (max-width: 600px) {
    .hero { padding: 60px 20px 40px; }
    .hero-stats { gap: 20px; }
    .controls { padding: 16px 20px; }
    .lines-legend { padding: 16px 20px; }
    .grid { grid-template-columns: 1fr; }
    .modal-body, .modal-hero { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<div class="hero-track"></div>

<header class="hero">
  <h1>Chicago <span>L</span> Eats</h1>
  <p>50 restaurants. 8 L lines. One city. Find your next meal by the train you take.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-n" id="stat-total">50</div><div class="stat-l">Restaurants</div></div>
    <div class="stat"><div class="stat-n">8</div><div class="stat-l">L Lines</div></div>
    <div class="stat"><div class="stat-n" id="stat-5star">–</div><div class="stat-l">5-Star Picks</div></div>
    <div class="stat"><div class="stat-n">14</div><div class="stat-l">Cuisines</div></div>
  </div>
</header>

<div class="lines-legend" id="linesLegend"></div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search restaurant, cuisine, station...">
  <select id="cuisineFilter"><option value="">All cuisines</option></select>
  <select id="neighborhoodFilter"><option value="">All neighborhoods</option></select>
  <select id="mealFilter"><option value="">All meals</option><option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option></select>
  <button class="sort-btn active" id="sortRating" onclick="setSort('rating')">★ Rating</button>
  <button class="sort-btn" id="sortPrice" onclick="setSort('price')">$ Price</button>
  <button class="sort-btn" id="sortName" onclick="setSort('name')">A–Z</button>
  <span class="count-badge" id="countBadge">49 spots</span>
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none;">No restaurants match your filters. Try a different line or search.</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-hero">
      <div class="modal-hero-bar" id="modalBar"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer>
  <p>Curated by <strong>Louis Sungwoo Cho</strong> &nbsp;·&nbsp; Chicago, IL &nbsp;·&nbsp; Ride the L, eat well.</p>
</footer>


<script>
const LINE_COLORS = {
  Red: '#C8102E',
  Blue: '#00A1DE',
  Brown: '#62361B',
  Green: '#009B3A',
  Orange: '#F9461C',
  Purple: '#522398',
  Pink: '#E27EA6',
  Yellow: '#F9E300'
};

const ALL_LINES = ['Red','Blue','Brown','Green','Orange','Purple','Pink','Yellow'];
let RAW = [];
let restaurants = [];

async function loadData() {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const countBadge = document.getElementById('countBadge');

  grid.innerHTML = '<div class="no-results" style="display:block;grid-column:1/-1;">Loading restaurants…</div>';
  noResults.style.display = 'none';
  countBadge.textContent = 'Loading…';

  try {
    const response = await fetch('./combined_restaurants.json', { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    RAW = await response.json();
    restaurants = RAW.filter(r => (r['Restaurants'] || '').trim() !== '');

    activeLines = new Set(ALL_LINES);
    populateFilters();
    buildLegend();
    updateStats();
    render();

    console.log(`Loaded ${restaurants.length} restaurants from combined_restaurants.json`);
  } catch (error) {
    console.error('Failed to load combined_restaurants.json:', error);
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-5star').textContent = '0';
    countBadge.textContent = '0 spots';
    grid.innerHTML = '<div class="no-results" style="display:block;grid-column:1/-1;">Could not load <code>combined_restaurants.json</code>. Make sure the HTML and JSON files are in the same folder and open them through a local server.</div>';
  }
}


let activeLines = new Set(ALL_LINES);
let currentSort = 'rating';

function getLines(lineStr) {
  if (!lineStr || lineStr === 'Varies') return [];
  return ALL_LINES.filter(line => String(lineStr).includes(line));
}

function getCuisines(cuisineStr) {
  if (!cuisineStr) return [];
  return String(cuisineStr).split(',').map(c => c.trim()).filter(Boolean);
}

function getRatingValue(value) {
  const n = parseFloat(value);
  return isNaN(n) ? -1 : n;
}

function getRatingColor(r) {
  if (r >= 5) return '#F9E300';
  if (r >= 4) return '#009B3A';
  if (r >= 3) return '#00A1DE';
  return '#888';
}

function getPriceValue(p) {
  const n = parseFloat(p);
  return isNaN(n) ? null : n;
}

function getPriceLabel(p) {
  const n = getPriceValue(p);
  if (n === null) return '—';
  if (n < 20) return '$';
  if (n < 35) return '$$';
  if (n < 55) return '$$$';
  return '$$$$';
}

function updateStats() {
  document.getElementById('stat-total').textContent = restaurants.length;
  document.getElementById('stat-5star').textContent = restaurants.filter(r => getRatingValue(r['Ratings (/5)']) === 5).length;
}

function populateFilters() {
  const cuisineEl = document.getElementById('cuisineFilter');
  const nbrEl = document.getElementById('neighborhoodFilter');

  cuisineEl.innerHTML = '<option value="">All cuisines</option>';
  nbrEl.innerHTML = '<option value="">All neighborhoods</option>';

  const cuisines = [...new Set(restaurants.flatMap(r => getCuisines(r['Cuisine'])))].sort((a,b) => a.localeCompare(b));
  const neighborhoods = [...new Set(restaurants.map(r => r['Neighborhood']).filter(Boolean))].sort((a,b) => a.localeCompare(b));

  cuisines.forEach(c => {
    const option = document.createElement('option');
    option.value = c;
    option.textContent = c;
    cuisineEl.appendChild(option);
  });

  neighborhoods.forEach(n => {
    const option = document.createElement('option');
    option.value = n;
    option.textContent = n;
    nbrEl.appendChild(option);
  });
}

function buildLegend() {
  const legend = document.getElementById('linesLegend');
  legend.innerHTML = '';

  ALL_LINES.forEach(line => {
    const badge = document.createElement('div');
    badge.className = 'line-badge active';
    badge.dataset.line = line;
    badge.style.background = LINE_COLORS[line] + '22';
    badge.style.color = line === 'Yellow' ? '#111' : LINE_COLORS[line];
    badge.innerHTML = `<div class="line-dot" style="background:${LINE_COLORS[line]}"></div>${line} Line`;
    badge.addEventListener('click', () => toggleLine(line));
    legend.appendChild(badge);
  });
}

function toggleLine(line) {
  if (activeLines.has(line)) {
    activeLines.delete(line);
  } else {
    activeLines.add(line);
  }

  document.querySelectorAll('.line-badge').forEach(badge => {
    const isActive = activeLines.has(badge.dataset.line);
    badge.classList.toggle('active', isActive);
    badge.classList.toggle('inactive', !isActive);
  });

  render();
}

function setSort(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('sortRating').classList.toggle('active', type === 'rating');
  document.getElementById('sortPrice').classList.toggle('active', type === 'price');
  document.getElementById('sortName').classList.toggle('active', type === 'name');
  render();
}

function getFilteredRestaurants() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const cuisineFilter = document.getElementById('cuisineFilter').value;
  const neighborhoodFilter = document.getElementById('neighborhoodFilter').value;
  const mealFilter = document.getElementById('mealFilter').value;

  const filtered = restaurants.filter(r => {
    const lines = getLines(r['L Line [Train]']);
    const matchesLine = lines.length === 0 || lines.some(line => activeLines.has(line));

    const haystack = [
      r['Restaurants'],
      r['Cuisine'],
      r['Neighborhood'],
      r['Nearest CTA L Stop [Train Station]'],
      r['Comments by Louis Sungwoo Cho']
    ].join(' ').toLowerCase();

    const matchesSearch = !search || haystack.includes(search);
    const matchesCuisine = !cuisineFilter || getCuisines(r['Cuisine']).includes(cuisineFilter);
    const matchesNeighborhood = !neighborhoodFilter || r['Neighborhood'] === neighborhoodFilter;
    const matchesMeal = !mealFilter || String(r['Meals'] || '').includes(mealFilter);

    return matchesLine && matchesSearch && matchesCuisine && matchesNeighborhood && matchesMeal;
  });

  filtered.sort((a, b) => {
    if (currentSort === 'rating') {
      return getRatingValue(b['Ratings (/5)']) - getRatingValue(a['Ratings (/5)']);
    }
    if (currentSort === 'price') {
      const aVal = getPriceValue(a['Price $']);
      const bVal = getPriceValue(b['Price $']);
      if (aVal === null && bVal === null) return 0;
      if (aVal === null) return 1;
      if (bVal === null) return -1;
      return aVal - bVal;
    }
    return String(a['Restaurants'] || '').localeCompare(String(b['Restaurants'] || ''));
  });

  return filtered;
}

function render() {
  const filtered = getFilteredRestaurants();
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const countBadge = document.getElementById('countBadge');

  countBadge.textContent = `${filtered.length} spots`;

  if (!filtered.length) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';

  grid.innerHTML = filtered.map((r, index) => {
    const rating = getRatingValue(r['Ratings (/5)']);
    const lines = getLines(r['L Line [Train]']);
    const accent = lines.length ? LINE_COLORS[lines[0]] : '#444';

    return `
      <div class="card" data-index="${index}">
        <div class="card-accent-bar" style="background:${accent}"></div>
        <div class="card-header">
          <div class="card-name">${r['Restaurants'] || 'Untitled'}</div>
          <div class="card-rating">
            <div class="rating-num" style="color:${getRatingColor(rating)}">${rating < 0 ? '–' : r['Ratings (/5)']}</div>
            <div class="rating-stars">/5</div>
          </div>
        </div>
        <div class="card-meta">
          <span class="meta-tag cuisine">${r['Cuisine'] || 'Unknown'}</span>
          <span class="meta-tag price">${getPriceLabel(r['Price $'])}</span>
        </div>
        <div class="card-station">
          <div class="station-icon">CTA</div>
          <div class="station-text"><span class="station-name">${r['Nearest CTA L Stop [Train Station]'] || 'Unknown stop'}</span></div>
        </div>
        <div class="card-lines">
          ${lines.map(line => `<div class="line-pill" title="${line}" style="background:${LINE_COLORS[line]}"></div>`).join('')}
        </div>
        <div class="card-comment">${r['Comments by Louis Sungwoo Cho'] || ''}</div>
        <div class="card-footer">
          <div class="card-hood">${r['Neighborhood'] || ''}</div>
          <a class="card-link" href="${r['Menu/Website'] || '#'}" target="_blank" rel="noopener noreferrer">Menu →</a>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.card').forEach((card, index) => {
    card.addEventListener('click', () => openModal(filtered[index]));
  });
}

function openModal(r) {
  const lines = getLines(r['L Line [Train]']);
  const linePills = lines.map(line => `
    <div class="modal-line-pill" style="background:${LINE_COLORS[line]}22; color:${line === 'Yellow' ? '#111' : LINE_COLORS[line]}; border:1px solid ${LINE_COLORS[line]}44;">
      <div class="line-dot" style="background:${LINE_COLORS[line]}"></div>${line}
    </div>
  `).join('');

  document.getElementById('modalBar').style.background = lines.length ? LINE_COLORS[lines[0]] : '#444';
  document.getElementById('modalTitle').textContent = r['Restaurants'] || '';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">Cuisine</div>
        <div class="modal-value">${r['Cuisine'] || '—'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Price</div>
        <div class="modal-value">${getPriceLabel(r['Price $'])}</div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">Neighborhood</div>
        <div class="modal-value">${r['Neighborhood'] || '—'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Rating</div>
        <div class="modal-value">${r['Ratings (/5)'] || '—'}</div>
      </div>
    </div>
    <div>
      <div class="modal-label">Nearest CTA Stop</div>
      <div class="modal-value">${r['Nearest CTA L Stop [Train Station]'] || '—'}</div>
    </div>
    <div>
      <div class="modal-label">Meals</div>
      <div class="modal-value">${r['Meals'] || '—'}</div>
    </div>
    <div>
      <div class="modal-label">Address</div>
      <div class="modal-value">${r['Address'] || '—'}</div>
    </div>
    <div>
      <div class="modal-label">Lines</div>
      <div class="modal-lines">${linePills || '<span class="modal-value">—</span>'}</div>
    </div>
    <div class="modal-comment-box">${r['Comments by Louis Sungwoo Cho'] || 'No note yet.'}</div>
    ${r['Menu/Website'] ? `<a href="${r['Menu/Website']}" target="_blank" rel="noopener noreferrer" class="modal-cta">View Menu / Website →</a>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(event) {
  if (event.target === document.getElementById('modalOverlay')) {
    closeModalDirect();
  }
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModalDirect();
});

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('cuisineFilter').addEventListener('change', render);
document.getElementById('neighborhoodFilter').addEventListener('change', render);
document.getElementById('mealFilter').addEventListener('change', render);

loadData();
</script>

</body>
</html>
